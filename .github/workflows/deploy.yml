name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - uses: actions/configure-pages@v5

      - run: npm ci

      - name: Build for GitHub Pages
        run: npm run build
        env:
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
          VITE_SUPABASE_URL: https://hytujuxndxfgkuhnvgef.supabase.co
          VITE_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh5dHVqdXhuZHhmZ2t1aG52Z2VmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkwMzM2MzMsImV4cCI6MjA5NDYwOTYzM30.8G-sHX-doXLJgQaM6Y-fmC4BABE7ISDLAOrSGl9_qvE

      - name: Verify production bundle (not dev index.html)
        run: |
          test -f dist/index.html
          grep -q '/assets/' dist/index.html
          ! grep -q 'src/main.tsx' dist/index.html
          echo "Built index.html:"
          cat dist/index.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
